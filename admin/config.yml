backend:
  name: github
  repo: Nadeemmayo/linkliftpro.online
  branch: main
  base_url: https://linkliftpro-cms-auth.seoinfo89.workers.dev
  auth_endpoint: auth

site_url: https://linkliftpro.online
display_url: https://linkliftpro.online
logo_url: https://linkliftpro.online/favicon.ico

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"

      - label: "Author"
        name: "author"
        widget: "string"
        default: "LinkLiftPro Team"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "SEO"
          - "Guest Posting"
          - "Link Building"
          - "Niche Edits"
          - "Authority Building"
          - "E-E-A-T SEO"
          - "SEO Audit"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false

      - label: "Short Description"
        name: "description"
        widget: "text"
        hint: "Write a short summary for Google and the blog card."

      - label: "Meta Title"
        name: "meta_title"
        widget: "string"
        hint: "Keep it around 50 to 60 characters."

      - label: "Meta Description"
        name: "meta_description"
        widget: "text"
        hint: "Keep it around 140 to 160 characters."

      - label: "Focus Keyword"
        name: "focus_keyword"
        widget: "string"
        required: false

      - label: "Canonical URL"
        name: "canonical_url"
        widget: "string"
        required: false
        hint: "Leave blank unless the article has another preferred URL."

      - label: "Schema Type"
        name: "schema_type"
        widget: "select"
        default: "BlogPosting"
        options:
          - "BlogPosting"
          - "Article"
          - "NewsArticle"

      - label: "Featured Image"
        name: "thumbnail"
        widget: "image"

      - label: "Featured Image Alt Text"
        name: "thumbnail_alt"
        widget: "string"

      - label: "Body"
        name: "body"
        widget: "markdown"

  - name: "pages"
    label: "Website Pages"

    files:
      - name: "homepage"
        label: "Home Page"
        file: "_data/home.yml"

        fields:
          - label: "SEO Settings"
            name: "seo"
            widget: "object"
            fields:
              - label: "SEO Title"
                name: "title"
                widget: "string"

              - label: "SEO Description"
                name: "description"
                widget: "text"

              - label: "Canonical URL"
                name: "canonical_url"
                widget: "string"

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - label: "Small Badge"
                name: "badge"
                widget: "string"

              - label: "Heading"
                name: "heading_before"
                widget: "string"

              - label: "Highlighted Heading"
                name: "highlighted_heading"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Primary Button Text"
                name: "primary_button_text"
                widget: "string"

              - label: "Primary Button URL"
                name: "primary_button_url"
                widget: "string"

              - label: "Secondary Button Text"
                name: "secondary_button_text"
                widget: "string"

              - label: "Secondary Button URL"
                name: "secondary_button_url"
                widget: "string"

              - label: "Portfolio Button Text"
                name: "portfolio_button_text"
                widget: "string"

              - label: "Portfolio Button URL"
                name: "portfolio_button_url"
                widget: "string"

              - label: "Niches Button Text"
                name: "niches_button_text"
                widget: "string"

              - label: "Niches Button URL"
                name: "niches_button_url"
                widget: "string"

          - label: "Statistics Section"
            name: "statistics"
            widget: "object"
            fields:
              - label: "Section Label"
                name: "section_label"
                widget: "string"

              - label: "Heading"
                name: "heading"
                widget: "string"

              - label: "Website Count"
                name: "website_count"
                widget: "string"

              - label: "Website Label"
                name: "website_label"
                widget: "string"

              - label: "Campaign Count"
                name: "campaign_count"
                widget: "string"

              - label: "Campaign Label"
                name: "campaign_label"
                widget: "string"

              - label: "Niche Count"
                name: "niche_count"
                widget: "string"

              - label: "Niche Label"
                name: "niche_label"
                widget: "string"

              - label: "Outreach Count"
                name: "outreach_count"
                widget: "string"

              - label: "Outreach Label"
                name: "outreach_label"
                widget: "string"

              - label: "Bottom Text"
                name: "bottom_text"
                widget: "text"

          - label: "Founder Section"
            name: "founder"
            widget: "object"
            fields:
              - label: "Section Label"
                name: "section_label"
                widget: "string"

              - label: "Founder Name"
                name: "name"
                widget: "string"

              - label: "Position"
                name: "position"
                widget: "string"

              - label: "Founder Image"
                name: "image"
                widget: "image"

              - label: "Image Alt Text"
                name: "image_alt"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "LinkedIn URL"
                name: "linkedin_url"
                widget: "string"

              - label: "Facebook URL"
                name: "facebook_url"
                widget: "string"

              - label: "WhatsApp URL"
                name: "whatsapp_url"
                widget: "string"

              - label: "Email"
                name: "email"
                widget: "string"

          - label: "Services Introduction"
            name: "services_section"
            widget: "object"
            fields:
              - label: "Section Label"
                name: "label"
                widget: "string"

              - label: "Heading"
                name: "heading_before"
                widget: "string"

              - label: "Highlighted Heading"
                name: "highlighted_heading"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

          - label: "Why Choose Us"
            name: "why_choose"
            widget: "object"
            fields:
              - label: "Section Label"
                name: "label"
                widget: "string"

              - label: "Heading"
                name: "heading_before"
                widget: "string"

              - label: "Highlighted Heading"
                name: "highlighted_heading"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

          - label: "Work Process"
            name: "process"
            widget: "object"
            fields:
              - label: "Heading"
                name: "heading_before"
                widget: "string"

              - label: "Highlighted Heading"
                name: "highlighted_heading"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

          - label: "Final Call To Action"
            name: "cta"
            widget: "object"
            fields:
              - label: "Heading"
                name: "heading"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Contact Button Text"
                name: "contact_button_text"
                widget: "string"

              - label: "Contact Button URL"
                name: "contact_button_url"
                widget: "string"

              - label: "Services Button Text"
                name: "services_button_text"
                widget: "string"

              - label: "Services Button URL"
                name: "services_button_url"
                widget: "string"

              - label: "FAQ Button Text"
                name: "faq_button_text"
                widget: "string"

              - label: "FAQ Button URL"
                name: "faq_button_url"
                widget: "string"

  - name: "portfolio"
    label: "Portfolio"
    label_singular: "Project"
    folder: "_portfolio"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"

    fields:
      - label: "Project Title"
        name: "title"
        widget: "string"

      - label: "Client Name"
        name: "client"
        widget: "string"
        required: false

      - label: "Category"
        name: "category"
        widget: "string"

      - label: "Featured Image"
        name: "image"
        widget: "image"

      - label: "Short Description"
        name: "description"
        widget: "text"

      - label: "Project URL"
        name: "url"
        widget: "string"
        required: false

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false

      - label: "Body"
        name: "body"
        widget: "markdown"
