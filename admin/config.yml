backend:
  name: github
  repo: Nadeemmayo/linkliftpro.online
  branch: main
  base_url: https://linkliftpro-cms-auth.seoinfo89.workers.dev
  auth_endpoint: auth

site_url: https://linkliftpro.online
display_url: https://linkliftpro.online
logo_url: https://linkliftpro.online/favicon.ico

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "thumbnail", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }
